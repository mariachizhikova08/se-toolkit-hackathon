name: dessert_client
description: Flutter Web client for the hackathon-desserts project
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_web_plugins:
    sdk: flutter
  http: ^1.1.0
  web_socket_channel: ^2.4.0
  provider: ^6.1.1
  shared_preferences_web: ^2.0.0
  google_fonts: ^6.1.0
  intl: ^0.18.1
  flutter_animate: ^4.3.0
  url_launcher: ^6.2.0
  cached_network_image: ^3.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
